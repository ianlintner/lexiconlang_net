name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore LexiconLang.Net.slnx

      - name: Format check
        run: dotnet format LexiconLang.Net.slnx --verify-no-changes --verbosity minimal

      - name: Build (warnings as errors)
        run: dotnet build LexiconLang.Net.slnx -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test LexiconLang.Net.slnx -c Release --no-build --verbosity minimal
